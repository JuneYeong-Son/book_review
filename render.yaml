# Render Blueprint — 백엔드(API) + 프론트(정적) + Postgres 한 번에 배포
# 사용법: Render 대시보드 → New → Blueprint → 이 저장소 연결 → Apply
# 배포 후 아래 sync:false 환경변수를 채워야 함:
#   - book-review-api: ALADIN_TTB_KEY, FRONTEND_URL(프론트 배포 주소)
#   - book-review-frontend: VITE_API_URL(백엔드 배포 주소)

databases:
  - name: book-review-db
    plan: free

services:
  # 백엔드 API (Express + Prisma)
  - type: web
    name: book-review-api
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm install && npm run build && SEED_SKIP_IF_DATA=1 npm run seed
    startCommand: npm start
    healthCheckPath: /api/books
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: book-review-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true # 세션 쿠키 서명 시크릿 (Render가 안정적인 랜덤값 생성)
      - key: ALADIN_TTB_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      # 이메일 인증(회원가입) 발송 — Resend. 없으면 인증코드가 서버 로그로만 출력(테스트 모드)
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        sync: false

  # 프론트엔드 (React 정적 빌드) — 정적 사이트는 plan 필드 없음(항상 무료)
  - type: web
    name: book-review-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
